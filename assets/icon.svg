<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="beck logo">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0c1419"/>
  
  <!-- Terminal window frame -->
  <rect x="64" y="80" width="384" height="352" rx="16" fill="#111" stroke="#333" stroke-width="2"/>
  
  <!-- Window dots -->
  <circle cx="100" cy="108" r="7" fill="#ff5f57"/>
  <circle cx="126" cy="108" r="7" fill="#febc2e"/>
  <circle cx="152" cy="108" r="7" fill="#28c840"/>
  
  <!-- Prompt -->
  <text x="96" y="175" font-family="monospace" font-size="24" fill="#666">$</text>
  
  <!-- "beck" text in terminal -->
  <text x="120" y="175" font-family="monospace" font-size="24" fill="#e0e0e0">beck</text>
  
  <!-- Blinking cursor -->
  <rect x="192" y="158" width="14" height="22" fill="#666"/>
  
  <!-- Output lines -->
  <text x="96" y="225" font-family="monospace" font-size="16" fill="#555">indexed 547 skills</text>
  <text x="96" y="260" font-family="monospace" font-size="16" fill="#555">saves 21,000 tokens/turn</text>
  
  <!-- Highlight stat -->
  <text x="96" y="310" font-family="monospace" font-size="20" fill="#e0e0e0" font-weight="bold">200 tokens</text>
  <text x="260" y="310" font-family="monospace" font-size="16" fill="#666">flat per session</text>
  
  <!-- Bottom bar -->
  <text x="96" y="380" font-family="monospace" font-size="14" fill="#444">2.0 MB  |  zero telemetry  |  MIT/Apache</text>
</svg>
